<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 8000 10000" width="800" height="1000">
  <!-- 1F Floor Plan - Units: mm, Scale 1:1 -->
  <!-- Building outline 8m x 10m -->
  <rect x="0" y="0" width="8000" height="10000" fill="none" stroke="black" stroke-width="30"/>

  <!-- Room divisions -->
  <!-- LDK: 6m x 5m (bottom-left) -->
  <rect x="0" y="5000" width="6000" height="5000" fill="none" stroke="black" stroke-width="15"/>
  <text x="3000" y="7500" text-anchor="middle" font-size="300">LDK</text>

  <!-- 和室: 2m x 5m (bottom-right) -->
  <rect x="6000" y="5000" width="2000" height="5000" fill="none" stroke="black" stroke-width="15"/>
  <text x="7000" y="7500" text-anchor="middle" font-size="300">和室</text>

  <!-- 浴室: 2m x 2.5m (top-left) -->
  <rect x="0" y="0" width="2000" height="2500" fill="none" stroke="black" stroke-width="15"/>
  <text x="1000" y="1250" text-anchor="middle" font-size="250">浴室</text>

  <!-- 廊下: 4m x 2.5m (top-center) -->
  <rect x="2000" y="0" width="4000" height="2500" fill="none" stroke="black" stroke-width="15"/>
  <text x="4000" y="1250" text-anchor="middle" font-size="250">廊下</text>

  <!-- 玄関: 2m x 2.5m (top-right) -->
  <rect x="6000" y="0" width="2000" height="2500" fill="none" stroke="black" stroke-width="15"/>
  <text x="7000" y="1250" text-anchor="middle" font-size="250">玄関</text>

  <!-- Windows (blue) -->
  <!-- South wall: 2 large windows 1.6m x 0.1m (representation) -->
  <rect x="1200" y="9900" width="1600" height="100" fill="blue" stroke="blue" stroke-width="5" data-type="window" data-real-height="2000"/>
  <rect x="4000" y="9900" width="1600" height="100" fill="blue" stroke="blue" stroke-width="5" data-type="window" data-real-height="2000"/>

  <!-- East wall: 1 medium window -->
  <rect x="7900" y="6500" width="100" height="1200" fill="blue" stroke="blue" stroke-width="5" data-type="window" data-real-width="1000"/>

  <!-- West wall: 1 small window (浴室) -->
  <rect x="0" y="500" width="100" height="800" fill="blue" stroke="blue" stroke-width="5" data-type="window" data-real-width="800"/>

  <!-- North wall: 1 small window -->
  <rect x="3000" y="0" width="600" height="100" fill="blue" stroke="blue" stroke-width="5" data-type="window" data-real-height="600"/>

  <!-- Door (red) -->
  <rect x="7000" y="0" width="1000" height="100" fill="red" stroke="red" stroke-width="5" data-type="door" data-real-height="2200"/>
</svg>
