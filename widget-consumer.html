.insulation-bar .bar-fill{height:100%;border-radius:5px;transition:width 0.4s ease,background 0.4s ease}
.insulation-bar .bar-text{display:flex;justify-content:space-between;margin-top:4px;font-size:10px;color:#aaa}

.stars{text-align:center;margin:12px 0;padding:10px;background:#fff8ef;border-radius:12px;border:1px solid #f5deb3}
.stars .label{font-size:11px;font-weight:600;color:#888;margin-bottom:2px}
.stars .star-display{font-size:24px;letter-spacing:2px}

.cta-green{display:block;background:linear-gradient(135deg,#16a34a 0%,#22c55e 100%);color:#fff;padding:16px 20px;border-radius:14px;text-align:center;font-size:16px;font-weight:800;text-decoration:none;margin:16px 0 8px;transition:all 0.2s;border:none;cursor:pointer;width:100%;box-shadow:0 4px 12px rgba(22,163,74,0.25)}

.cta-green .cta-sub{font-size:11px;color:rgba(255,255,255,0.85);margin-top:3px;font-weight:400}

.link-detail{display:block;text-align:center;color:#e67e22;font-size:13px;font-weight:700;text-decoration:none;padding:10px;margin:4px 0;transition:color 0.2s}
.link-detail:hover{color:#d35400}

.powered{text-align:center;font-size:10px;color:#bbb;margin-top:12px;padding-top:10px;border-top:1px solid #f0f0f0}
.powered a{color:#e67e22;text-decoration:none;font-weight:600}

.icon-svg { display: inline-block; width: 1.2em; height: 1.2em; vertical-align: -0.15em; }
.icon-svg.large { width: 48px; height: 48px; }
.icon-svg.medium { width: 32px; height: 32px; }

var PE_STD_ABS={
  heat:{1:67200,2:57600,3:42500,4:36900,5:22100,6:16800,7:10200,8:2100},
  cool:{1:2400,2:3200,3:4800,4:5900,5:8500,6:10500,7:14200,8:22500},
  vent:{1:5800,2:5500,3:5200,4:5000,5:4800,6:4700,7:4600,8:4500},
  hw:  {1:28500,2:27600,3:26800,4:26200,5:25200,6:24600,7:23400,8:22000},
  light:{1:8900,2:8900,3:8900,4:8900,5:8900,6:8900,7:8900,8:8900},
  other:{1:21241,2:21241,3:21241,4:21241,5:21241,6:21241,7:21241,8:21241}
};
var PRESET={area:120,envArea:310,wallA:120,ceilA:60,floorA:60,winA:21,doorA:3.5};

// Grade -> spec mapping (wallR, ceilR, floorR, winU)
var GRADE_SPECS={
  4:{wallR:2.22, ceilR:2.22, floorR:1.79, winU:4.65},
  5:{wallR:2.63, ceilR:4.44, floorR:3.57, winU:2.33},
  6:{wallR:3.00, ceilR:4.44, floorR:3.57, winU:1.90},
  7:{wallR:4.55, ceilR:6.67, floorR:4.55, winU:1.30}
};

var ELEC_PEF=9.76;
var GAS_PEF=45;
function ELEC_RATE(kwh){var c=14400;if(kwh<=120*12)return c+kwh*20;c+=120*12*20;kwh-=120*12;if(kwh<=180*12)return c+kwh*26;c+=180*12*26;kwh-=180*12;return c+kwh*30}
function GAS_RATE(m3){return 9600+m3*145}

var currentGrade=6;
var currentMode='new';

// ================================================================
// CORE CALC
// ================================================================
function getUW(R){return 1/(0.15+parseFloat(R))}
function getUC(R){return 1/(0.13+parseFloat(R))}
function getUF(R){return 1/(0.19+parseFloat(R))}
function $(id){return document.getElementById(id)}

function calcUA(region,wallR,ceilR,floorR,winU){
  var p=PRESET;
  var wallU=getUW(wallR),ceilU=getUC(ceilR),floorU=getUF(floorR);
  var doorU=3.49;
  var dirs=[0.15,0.20,0.45,0.20];
  var tl=0;
  for(var i=0;i<dirs.length;i++){
    var wA=p.winA*dirs[i];
    var wlA=p.wallA/4-wA;
    tl+=Math.max(wlA,0)*wallU+wA*winU;
  }
  tl+=p.ceilA*ceilU;
  tl+=p.floorA*floorU*0.7;
  tl+=p.doorA*doorU;
  return p.envArea>0?tl/p.envArea:0;
}

function calcEnergyCost(region,ua){
  var uaStd=UA_STD[region]||0.87;
  if(!uaStd)uaStd=0.87;
  var ratio=Math.max(ua/uaStd,0.3);
  var totalMJ=0;
  var cats=['heat','cool','vent','hw','light','other'];
  for(var i=0;i<cats.length;i++){
    var base=PE_STD_ABS[cats[i]][region];
    if(cats[i]==='heat')totalMJ+=base*ratio;
    else totalMJ+=base;
  }
  var hwMJ=PE_STD_ABS.hw[region];
  var elecMJ=totalMJ-hwMJ;
  var elecKwh=elecMJ/ELEC_PEF;
  var gasM3=hwMJ/GAS_PEF;
  var annual=ELEC_RATE(elecKwh)+GAS_RATE(gasM3);
  return Math.round(annual);
}

function matchSubsidies(ua,grade,region){
  var zehStd=ZEH_STD[region];
  var zehUA=zehStd?ua<=zehStd:false;
  var uaStd=UA_STD[region]||0.87;
  var bei=uaStd?Math.max(0.5,0.7+0.3*(ua/uaStd)):0.8;
  var subs=[];
  if(grade>=6&&bei<=0.8)subs.push({name:'子育てエコホーム支援(ZEH水準)',amt:100});
  else if(grade>=5&&bei<=0.9)subs.push({name:'子育てエコホーム支援(長期優良)',amt:100});
  if(zehUA&&bei<=0.8)subs.push({name:'ZEH補助金',amt:55});
  if(grade>=6)subs.push({name:'地域型グリーン化(高度省エネ)',amt:140});
  else if(grade>=5)subs.push({name:'地域型グリーン化(長寿命型)',amt:110});
  var loanLimit=0;
  if(zehUA&&bei<=0.8){loanLimit=4500}
  else if(grade>=4){loanLimit=4000}
  if(loanLimit>0){
    var taxBenefit=Math.round(loanLimit*0.007*13);
    subs.push({name:'住宅ローン減税',amt:taxBenefit});
  }
  if(zehUA)subs.push({name:'フラット35S Aプラン',amt:Math.round(3500*0.005*10)});
  else if(grade>=4)subs.push({name:'フラット35S Bプラン',amt:Math.round(3500*0.0025*5)});
  return subs;
}

// ================================================================
// UI HANDLERS
// ================================================================
function pickGrade(el){
  var bs=document.querySelectorAll('.grade-btn');
  for(var i=0;i<bs.length;i++)bs[i].classList.remove('on');
  el.classList.add('on');
  currentGrade=parseInt(el.dataset.grade,10);
  recalc();
}

function setMode(mode){
  currentMode=mode;
  $('modeNew').classList.toggle('on',mode==='new');
  $('modeReform').classList.toggle('on',mode==='reform');
  recalc();
}

// ================================================================
// MAIN RECALC
// ================================================================
function recalc(){
  var region=parseInt($('regionSel').value,10);
  var specs=GRADE_SPECS[currentGrade];
  if(!specs)return;

  var ua=calcUA(region,specs.wallR,specs.ceilR,specs.floorR,specs.winU);
  var grade=currentGrade;

  // Annual cost
  var annualCost=calcEnergyCost(region,ua);
  // Reform mode: slightly higher costs (partial insulation effectiveness ~85%)
  if(currentMode==='reform'){
    annualCost=Math.round(annualCost*1.12);
  }
  var monthly=Math.round(annualCost/12);

  $('monthlyCost').textContent='\u00a5'+monthly.toLocaleString();
  $('annualCostSub').textContent='\u5e74\u9593 \u00a5'+annualCost.toLocaleString();

  // Saving vs baseline (grade 4)
  var baseSpecs=GRADE_SPECS[4];
  var baseUA=calcUA(region,baseSpecs.wallR,baseSpecs.ceilR,baseSpecs.floorR,baseSpecs.winU);
  var baseCost=calcEnergyCost(region,baseUA);
  var saving=baseCost-annualCost;
  if(saving<0)saving=0;
  $('savingVal').textContent='\u00a5'+saving.toLocaleString();
  $('savingSub').textContent=saving>0?'\u4e00\u822c\u7684\u306a\u5bb6\u3088\u308a\u304a\u30c8\u30af':'\u57fa\u6e96\u3068\u540c\u7b49';

  // Subsidies
  var subs=matchSubsidies(ua,grade,region);
  var totalSub=0;
  for(var i=0;i<subs.length;i++)totalSub+=subs[i].amt;
  if(totalSub>0){
    $('subsidyVal').textContent='\u6700\u5927 '+totalSub+'\u4e07\u5186';
    $('subsidySub').textContent=subs.length+'\u4ef6\u306e\u5236\u5ea6\u304c\u5bfe\u8c61';
  }else{
    $('subsidyVal').textContent='\u2015';
    $('subsidySub').textContent='\u5bfe\u8c61\u5236\u5ea6\u306a\u3057';
  }

  // Insulation score bar (UA value: lower = better)
  // Range: 0.20 (best) to 1.0 (worst). Map to percentage (inverted)
  var uaClamped=Math.max(0.15,Math.min(ua,1.0));
  var barPct=((uaClamped-0.15)/(1.0-0.15))*100;
  $('uaBar').style.width=barPct+'%';
  // Color: green when low, orange when mid, red when high
  if(barPct<30){
    $('uaBar').style.background='#16a34a';
  }else if(barPct<60){
    $('uaBar').style.background='#e67e22';
  }else{
    $('uaBar').style.background='#dc2626';
  }
  // Show descriptive label instead of raw number
  var scoreLabel;
  if(grade>=7)scoreLabel='\u6700\u9ad8\u30e9\u30f3\u30af';
  else if(grade>=6)scoreLabel='\u512a\u79c0';
  else if(grade>=5)scoreLabel='\u826f\u597d';
  else scoreLabel='\u6700\u4f4e\u9650';
  $('uaLabel').textContent=scoreLabel;

  // Warmth (based on estimated hallway temperature)
  var outdoorTemp={1:-8,2:-4,3:-2,4:1,5:3,6:5,7:7,8:15};
  var tOut=outdoorTemp[region]||3;
  var factor=Math.min(0.95,Math.max(0.3,1-ua*0.6));
  var hallway=Math.round(tOut+(20-tOut)*factor);

  if(hallway>15){
    $('warmthEmoji').innerHTML='<svg class="icon-svg" style="color:#16a34a;width:28px;height:28px"><use href="#ic-warmface"/></svg>';
    $('warmthText').textContent='\u6696\u304b\u3044\u5bb6\uff08\u5eca\u4e0b '+hallway+'\u00b0C\uff09';
    $('warmthText').style.color='#16a34a';
  }else if(hallway>=10){
    $('warmthEmoji').innerHTML='<svg class="icon-svg" style="color:#e67e22;width:28px;height:28px"><use href="#ic-neutralface"/></svg>';
    $('warmthText').textContent='\u666e\u901a\uff08\u5eca\u4e0b '+hallway+'\u00b0C\uff09';
    $('warmthText').style.color='#e67e22';
  }else{
    $('warmthEmoji').innerHTML='<svg class="icon-svg" style="color:#dc2626;width:28px;height:28px"><use href="#ic-coldface"/></svg>';
    $('warmthText').textContent='\u5bd2\u3044\u5bb6\uff08\u5eca\u4e0b '+hallway+'\u00b0C\uff09';
    $('warmthText').style.color='#dc2626';
  }

  // Stars (overall recommendation)
  var starCount;
  if(grade>=7)starCount=6;
  else if(grade>=6)starCount=5;
  else if(grade>=5)starCount=4;
  else starCount=3;
  var starStr='';
  for(var s=0;s<starCount;s++)starStr+='<svg class="icon-svg" style="color:#eab308;width:20px;height:20px"><use href="#ic-star"/></svg>';
  for(var s=starCount;s<6;s++)starStr+='<svg class="icon-svg" style="color:#d4d4d8;width:20px;height:20px"><use href="#ic-star"/></svg>';
  $('starDisplay').innerHTML=starStr;

  // Update detail link
  $('ctaDetail').href='../index.html?region='+region;
}

// ================================================================
// URL PARAMS
// ================================================================
function applyParams(){
  var params=new URLSearchParams(window.location.search);
  if(params.has('region')){
    var r=parseInt(params.get('region'),10);
    if(r>=1&&r<=8)$('regionSel').value=r;
  }
  if(params.has('grade')){
    var g=parseInt(params.get('grade'),10);
    if(g>=4&&g<=7){
      currentGrade=g;
      var bs=document.querySelectorAll('.grade-btn');
      for(var i=0;i<bs.length;i++){
        bs[i].classList.remove('on');
        if(parseInt(bs[i].dataset.grade,10)===g)bs[i].classList.add('on');
      }
    }
  }
  if(params.has('mode')){
    var m=params.get('mode');
    if(m==='reform')setMode('reform');
    else setMode('new');
  }
}

// ================================================================
// INIT
// ================================================================
applyParams();
recalc();
</script>
</body>
</html>
